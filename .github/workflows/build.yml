name: "Build"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 0"
  push:
    branches:
      - 'main'
    paths:
      - "build.sh"
      - ".github/workflows/build.yml"
      - "wslconf/*"

permissions:
  contents: write  

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    outputs:
      RELEASE: ${{ steps.start_build.outputs.RELEASE }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: amd64
          archive: false
          path: trisquel-amd64.wsl

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arm64
          archive: false
          path: trisquel-arm64.wsl

  release:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
         merge-multiple: true

      - name: Release stable
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Release latest
          files: |
            trisquel-arm64.wsl
            trisquel-amd64.wsl
          preserve_order: true
          make_latest: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}